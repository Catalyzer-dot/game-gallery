name: Deploy Frontend to Linux Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'games.json'
      - 'games/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      # ===== 主前端 apps/web =====
      - name: Build web frontend
        working-directory: ./apps/web
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: https://degenerates.site
        run: npm run build

      - name: Deploy web to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web build ${{ github.sha }}'

      # ===== fund-tracker 子前端 apps/fund =====
      - name: Build fund frontend
        working-directory: ./apps/fund
        env:
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy fund to fund-dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/fund/dist
          publish_branch: fund-dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy fund build ${{ github.sha }}'

      # ===== 服务器侧部署：git pull（跨境比 SCP 稳得多） =====
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e
            REPO_URL="https://github.com/${{ github.repository }}.git"

            sync_branch_to() {
              local branch="$1" target="$2"
              echo "==== sync $branch → $target"
              if [ -d "$target/.git" ]; then
                cd "$target"
                git fetch --depth 1 origin "$branch" --quiet
                git reset --hard "origin/$branch" --quiet
                git clean -fd --quiet
              else
                rm -rf "$target"
                git clone --depth 1 --branch "$branch" "$REPO_URL" "$target"
              fi
            }

            # ----- web 静态：dist 分支 -----
            sync_branch_to dist /opt/game-gallery/web/dist
            echo "✅ web → /opt/game-gallery/web/dist"

            # ----- fund 静态：fund-dist 分支 -----
            sync_branch_to fund-dist /opt/fund-tracker/web/dist
            echo "✅ fund → /opt/fund-tracker/web/dist"

            # ----- fund-tracker docker container -----
            FT=/opt/fund-tracker
            if [ ! -d "$FT/.git" ]; then
              echo "首次 init fund-tracker repo → $FT"
              # 用临时目录 clone，把 .git 搬过去（避免删除已存在的 web/dist 与 data）
              git clone --depth 1 https://github.com/YBoomer/fund-tracker.git "${FT}.tmp"
              mv "${FT}.tmp/.git" "$FT/"
              cd "$FT"
              # 用仓库 HEAD 覆盖工作树（已有 web/dist 与 data 不在仓库里，不会被动）
              git checkout -- . 2>/dev/null || true
              rm -rf "${FT}.tmp"
            else
              cd "$FT"
              echo "🔄 git pull fund-tracker"
              git fetch --depth 1 --quiet
              git reset --hard origin/main --quiet
            fi

            # 把 deploy/* 拷到部署根方便 sync-data 找
            cp deploy/docker-compose.yml deploy/deploy.sh deploy/sync-data.sh ./
            chmod +x deploy.sh sync-data.sh

            echo "📥 docker pull fund-tracker latest"
            docker pull ghcr.io/yboomer/fund-tracker:latest

            echo "🔄 docker compose up"
            IMAGE=ghcr.io/yboomer/fund-tracker:latest docker compose up -d --force-recreate

            sleep 3
            docker compose ps fund-tracker || true
            echo "✅ fund-tracker container deployed"

      - name: Done
        run: |
          echo "Deployment completed."
          echo "  web:  https://degenerates.site"
          echo "  fund: https://fund.degenerates.site"
